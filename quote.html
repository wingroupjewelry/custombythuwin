<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Calculator — Custom By Thu Win</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="quote.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="q-header">
    <div class="q-header-inner">
      <a href="portal.html" class="q-back"><i class="fa-solid fa-arrow-left"></i> Portal</a>
      <div class="q-brand">
        <span class="logo-main">Custom By Thu Win</span>
        <span class="logo-sub">Quote Calculator</span>
      </div>
      <button class="q-pdf-btn" id="generatePdf">
        <i class="fa-solid fa-file-pdf"></i> Generate PDF
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       MAIN LAYOUT
  ══════════════════════════════════════ -->
  <main class="q-main">
    <div class="q-layout">

      <!-- ═══ LEFT: Calculator ═══ -->
      <div class="q-calc">

        <!-- Client Info -->
        <div class="q-section">
          <h2 class="q-section-title"><i class="fa-solid fa-user"></i> Client Information</h2>
          <div class="q-row-3">
            <div class="q-group">
              <label>Client Name</label>
              <input type="text" id="clientName" placeholder="Full name" />
            </div>
            <div class="q-group">
              <label>Date</label>
              <input type="date" id="quoteDate" />
            </div>
            <div class="q-group">
              <label>Quote #</label>
              <input type="text" id="quoteNum" readonly />
            </div>
          </div>
          <div class="q-row-2">
            <div class="q-group">
              <label>Phone</label>
              <input type="tel" id="clientPhone" placeholder="+1 (000) 000-0000" />
            </div>
            <div class="q-group">
              <label>Email</label>
              <input type="email" id="clientEmail" placeholder="client@email.com" />
            </div>
          </div>
          <div class="q-group">
            <label>Piece Description</label>
            <input type="text" id="pieceDesc" placeholder="e.g. Custom 18K Engagement Ring with Oval Diamond" />
          </div>
        </div>

        <!-- Metal -->
        <div class="q-section">
          <h2 class="q-section-title"><i class="fa-solid fa-ring"></i> Metal</h2>
          <div id="metalRows"></div>
          <button class="q-add-btn" id="addMetal"><i class="fa-solid fa-plus"></i> Add Metal</button>
        </div>

        <!-- Diamonds & Stones -->
        <div class="q-section">
          <h2 class="q-section-title"><i class="fa-solid fa-gem"></i> Diamonds &amp; Stones</h2>
          <div id="stoneRows"></div>
          <button class="q-add-btn" id="addStone"><i class="fa-solid fa-plus"></i> Add Stone / Diamond</button>
        </div>

        <!-- Finishing & Labor -->
        <div class="q-section">
          <h2 class="q-section-title"><i class="fa-solid fa-sparkles"></i> Finishing &amp; Labor</h2>

          <div class="finishing-grid">
            <label class="finishing-item">
              <input type="checkbox" id="chkPrePolish" />
              <span class="fcheck"></span>
              <span class="finishing-name">Pre-Polishing &amp; Cleaning</span>
              <span class="finishing-price">$30.00</span>
            </label>
            <label class="finishing-item">
              <input type="checkbox" id="chkPolish" />
              <span class="fcheck"></span>
              <span class="finishing-name">Polishing</span>
              <span class="finishing-price">$30.00</span>
            </label>
            <label class="finishing-item enamel-item">
              <input type="checkbox" id="chkEnamel" />
              <span class="fcheck"></span>
              <span class="finishing-name">Enamel Work</span>
              <div class="enamel-amt" id="enamelAmt">
                <span>$</span>
                <input type="number" id="enamelPrice" placeholder="0.00" min="0" step="0.01" />
              </div>
            </label>
          </div>

          <div class="labor-row">
            <label>Labor &amp; Craftsmanship</label>
            <div class="dollar-input">
              <span>$</span>
              <input type="number" id="laborCost" placeholder="0.00" min="0" step="0.01" />
            </div>
          </div>

          <div class="q-group" style="margin-top:1.25rem">
            <label>Notes / Additional Details</label>
            <textarea id="quoteNotes" rows="4" placeholder="Special instructions, materials, client notes…"></textarea>
          </div>
        </div>

      </div><!-- end q-calc -->

      <!-- ═══ RIGHT: Live Summary ═══ -->
      <div class="q-summary" id="qSummary">
        <div class="qs-header">
          <h2>Quote Summary</h2>
          <span class="qs-num" id="qs-num">—</span>
        </div>
        <div class="qs-client">
          <div class="qs-client-name" id="qs-name">Client Name</div>
          <div class="qs-piece" id="qs-piece">Piece Description</div>
        </div>
        <div class="qs-lines" id="qs-lines">
          <p class="qs-empty">Add items on the left to see your quote breakdown.</p>
        </div>
        <div class="qs-totals">
          <div class="qs-subtotal">
            <span>Subtotal</span>
            <span id="qs-subtotal">$0.00</span>
          </div>
          <div class="qs-total">
            <span>Total</span>
            <span id="qs-total">$0.00</span>
          </div>
        </div>
        <button class="q-pdf-btn-full" id="generatePdf2">
          <i class="fa-solid fa-file-pdf"></i> Generate PDF Quote
        </button>
      </div>

    </div><!-- end q-layout -->
  </main>

  <script src="quote.js"></script>
</body>
</html>
